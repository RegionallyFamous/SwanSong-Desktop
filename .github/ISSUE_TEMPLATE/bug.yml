name: Bug report
description: Report reproducible SwanSong behavior without sharing private game files.
title: "[Bug]: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve SwanSong. Never attach ROMs, system startup files, saves, save states, or private Translation Lab evidence.
  - type: input
    id: version
    attributes:
      label: SwanSong version and build
      description: Copy this from SwanSong Help → SwanSong Help → Copy Support Information.
      placeholder: "Version (build)"
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: Mac and macOS
      placeholder: "macOS 15.5, MacBook Pro (Apple M2)"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Install or launch
        - Library or import
        - Gameplay or graphics
        - Audio
        - Input or controller
        - Saves, states, or Time Ribbon
        - Translation Shelf
        - Translation Lab
        - Accessibility or interface
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use an open-source fixture when possible.
      placeholder: |
        1. Open…
        2. Choose…
        3. Observe…
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior and exact error text
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private game, startup-file, save, screenshot, and translation material.
          required: true
        - label: This is not an undisclosed security vulnerability.
          required: true
