name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Plan CI
    runs-on: ubuntu-latest
    outputs:
      preflight: ${{ steps.classify.outputs.preflight }}
      release_chain: ${{ steps.classify.outputs.release_chain }}
      compatibility: ${{ steps.classify.outputs.compatibility }}
      translation: ${{ steps.classify.outputs.translation }}
      av: ${{ steps.classify.outputs.av }}
      tests: ${{ steps.classify.outputs.tests }}
    steps:
      - name: Check out exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Select required lanes
        id: classify
        env:
          BASE_REVISION: ${{ github.event.pull_request.base.sha }}
          HEAD_REVISION: ${{ github.sha }}
        run: |
          set -eu
          ./Scripts/selftest-ci-change-classifier.sh
          if [ "$GITHUB_EVENT_NAME" != "pull_request" ]; then
            {
              echo "preflight=true"
              echo "release_chain=true"
              echo "compatibility=true"
              echo "translation=true"
              echo "av=true"
              echo "tests=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ./Scripts/classify-ci-changes.sh \
            "$BASE_REVISION" \
            "$HEAD_REVISION" >> "$GITHUB_OUTPUT"

  tests:
    name: Tests (${{ matrix.label }})
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS 14 Apple silicon
            runner: macos-14
            developer_dir: /Applications/Xcode_16.2.app/Contents/Developer
            lane: full
          - label: macOS 15 Intel
            runner: macos-15-intel
            developer_dir: /Applications/Xcode.app/Contents/Developer
            lane: compatibility
    # Keep the required matrix check names for branch protection, but do not
    # reserve two macOS machines just to acknowledge prose/appcast-only work.
    runs-on: ${{ needs.changes.outputs.tests == 'true' && matrix.runner || 'ubuntu-latest' }}
    timeout-minutes: 35
    env:
      DEVELOPER_DIR: ${{ matrix.developer_dir }}
      SWAN_SDK_SOURCE_REPOSITORY: ${{ github.workspace }}/.sdk/swansong-sdk
      SWAN_SWIFTPM_DISABLE_KEYCHAIN: "1"
      # AppKit/SwiftUI rasterization is OS-specific. Both runners still render
      # every surface and enforce geometry/content invariants; reviewed pixel
      # hashes remain strict on the macOS family that produced the baseline.
      SWAN_SONG_ALLOW_UI_BASELINE_PLATFORM_MISMATCH: "1"
      RUN_TESTS: ${{ needs.changes.outputs.tests }}
    steps:
      - name: Confirm fast pull-request lane
        if: env.RUN_TESTS != 'true'
        run: echo "Only prose or the signed appcast changed; the required test lane is complete."

      - name: Check out exact source
        if: env.RUN_TESTS == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check out locked SwanSong SDK source
        if: env.RUN_TESTS == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: RegionallyFamous/swansong-sdk
          ref: f9bab7451593d0d8640816c60e0836377c65027e
          path: .sdk/swansong-sdk
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Record toolchain and architecture
        if: env.RUN_TESTS == 'true'
        run: |
          set -eu
          xcodebuild -version
          sw_vers
          uname -m

      - name: Run complete Swift and XCTest suite
        if: env.RUN_TESTS == 'true' && (matrix.lane == 'full' || github.event_name != 'pull_request')
        env:
          # Prove the published catalog and its signed production trust while
          # the full test target is already built. The release lane repeats
          # the focused gate for explicit release evidence.
          SWAN_ENFORCE_HOMEBREW_PRODUCTION_READINESS: ${{ matrix.lane == 'full' && '1' || '0' }}
          SWAN_HOMEBREW_REPOSITORY_ROOT: ${{ github.workspace }}
        run: ./Scripts/swift-package.sh test --package-path . --disable-index-store

      - name: Build and inspect Intel engine and library target
        if: env.RUN_TESTS == 'true' && matrix.lane == 'compatibility' && github.event_name == 'pull_request'
        # The Intel hosted runner has a tighter memory ceiling. Bound SwiftPM's
        # cold-build parallelism, then inspect the native product without relying
        # on that image's policy for launching ad-hoc standalone executables.
        run: |
          set -eu
          ./Scripts/swift-package.sh build \
            --package-path . \
            --disable-index-store \
            --jobs 2 \
            --product SwanSongChecks
          BIN_DIR=$(./Scripts/swift-package.sh build \
            --package-path . \
            --disable-index-store \
            --show-bin-path)
          test -x "$BIN_DIR/SwanSongChecks"
          test "$(lipo -archs "$BIN_DIR/SwanSongChecks")" = "x86_64"

      - name: Run engine-boundary and library checks
        if: env.RUN_TESTS == 'true' && matrix.lane == 'full'
        run: ./Scripts/swift-package.sh run --skip-build --package-path . SwanSongChecks

      - name: Check local MCP protocol surface
        if: env.RUN_TESTS == 'true' && matrix.lane == 'full'
        run: |
          set -eu
          ./Scripts/check-mcp-server.sh
          ./Scripts/check-playtest-mcp-server.sh

      - name: Check fail-closed production configuration
        if: env.RUN_TESTS == 'true' && matrix.lane == 'full'
        run: |
          set -eu
          ./Scripts/check-release-metadata.sh
          ./Scripts/prepare-wiki-sync.sh --check
          python3 ./Scripts/check-sparkle-dependency-lock.py --repository .

      - name: Verify release-only integrations
        if: env.RUN_TESTS == 'true' && matrix.lane == 'full' && github.event_name != 'pull_request'
        run: |
          set -eu
          ./Scripts/check-homebrew-production-readiness.sh
          ./Scripts/selftest-swansong-sdk-payload.sh

  release-preflight:
    name: Release preflight
    needs: changes
    # The no-op required check is portable; reserve the macOS release runner
    # only when the classifier selected a packaged-app or live-engine lane.
    runs-on: ${{ needs.changes.outputs.preflight == 'true' && 'macos-14' || 'ubuntu-latest' }}
    timeout-minutes: 75
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
      SWAN_SDK_SOURCE_REPOSITORY: ${{ github.workspace }}/.sdk/swansong-sdk
      SWAN_SWIFTPM_DISABLE_KEYCHAIN: "1"
      SWAN_SIGNING_MODE: adhoc
      SWAN_SONG_ALLOW_UI_BASELINE_PLATFORM_MISMATCH: "1"
      RUN_PREFLIGHT: ${{ needs.changes.outputs.preflight }}
      RUN_RELEASE_CHAIN: ${{ needs.changes.outputs.release_chain }}
      RUN_COMPATIBILITY: ${{ needs.changes.outputs.compatibility }}
      RUN_TRANSLATION: ${{ needs.changes.outputs.translation }}
      RUN_AV: ${{ needs.changes.outputs.av }}
      # Affected pull requests prove live contracts with shorter bounded
      # samples. Main/manual runs retain every universal and soak gate.
      SWAN_MATRIX_FRAMES: ${{ github.event_name == 'pull_request' && '180' || '360' }}
      SWAN_MATRIX_WARMUP_FRAMES: ${{ github.event_name == 'pull_request' && '60' || '120' }}
    steps:
      - name: Confirm fast pull-request lane
        if: env.RUN_PREFLIGHT != 'true'
        run: echo "No packaged-app or live-engine surface changed; the required preflight is complete."

      - name: Check out exact source
        if: env.RUN_PREFLIGHT == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check out locked SwanSong SDK source
        if: env.RUN_PREFLIGHT == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: RegionallyFamous/swansong-sdk
          ref: f9bab7451593d0d8640816c60e0836377c65027e
          path: .sdk/swansong-sdk
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve pinned release dependencies
        if: env.RUN_PREFLIGHT == 'true'
        run: ./Scripts/swift-package.sh package resolve --package-path .

      - name: Run release-chain tamper and rollback self-tests
        if: env.RUN_RELEASE_CHAIN == 'true'
        run: |
          set -eu
          ./Scripts/selftest-ares-source-state.sh
          ./Scripts/selftest-release-build-snapshot.sh
          ./Scripts/selftest-package-release-snapshots.sh
          ./Scripts/selftest-release-artifacts.sh
          ./Scripts/selftest-release-installer.sh
          ./Scripts/selftest-sparkle-dependency-lock.sh
          ./Scripts/selftest-sparkle-appcast.sh
          ./Scripts/selftest-swansong-sdk-payload.sh

      - name: Configure shared preflight build
        if: env.RUN_PREFLIGHT == 'true'
        run: |
          set -eu
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            echo "SWAN_UNIVERSAL=0" >> "$GITHUB_ENV"
            echo "ARES_BUILD_DIR=$GITHUB_WORKSPACE/.engine/build-app" >> "$GITHUB_ENV"
          else
            echo "SWAN_UNIVERSAL=1" >> "$GITHUB_ENV"
            echo "ARES_BUILD_DIR=$GITHUB_WORKSPACE/.engine/build-app-universal" >> "$GITHUB_ENV"
          fi

      - name: Build and inspect application
        if: env.RUN_PREFLIGHT == 'true'
        run: |
          set -eu
          ./Scripts/build-app.sh
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            required_architectures=arm64
          else
            required_architectures="arm64 x86_64"
          fi
          ./Scripts/check-app-payload.sh .build/app/SwanSong.app
          SWAN_REQUIRED_ARCHITECTURES="$required_architectures" \
            ./Scripts/verify-app-architectures.sh .build/app/SwanSong.app
          ./Scripts/check-sparkle-configuration.sh .build/app/SwanSong.app
          ./Scripts/check-sparkle-framework.sh .build/app/SwanSong.app

      - name: Run public-fixture compatibility matrix
        if: env.RUN_COMPATIBILITY == 'true'
        run: ./Scripts/check-compatibility-matrix.sh

      - name: Prove source-built engine reproducibility
        if: env.RUN_COMPATIBILITY == 'true'
        run: ./Scripts/check-engine-reproducibility.sh

      - name: Run live input-frame bridge regression
        if: env.RUN_COMPATIBILITY == 'true'
        run: ./Scripts/check-input-frame-bridge.sh

      - name: Run guarded Translation Lab automation CLI
        if: env.RUN_TRANSLATION == 'true'
        run: |
          set -eu
          ./Scripts/check-playtest-cli.sh
          ./Scripts/check-translation-automation-cli.sh

      - name: Run scheduler-neutral A/V integrity soak
        if: env.RUN_AV == 'true'
        env:
          SWAN_AV_SOAK_SECONDS: ${{ github.event_name == 'pull_request' && '20' || '60' }}
          # Shared hosted runners can inject 100+ ms scheduling gaps. Keep CI
          # strict about media integrity and >=70 Hz throughput; the release
          # Mac separately runs the default wall-clock 30-minute gate.
          SWAN_AV_SOAK_CLOCK_MODE: media-time
        run: ./Scripts/check-av-soak.sh
