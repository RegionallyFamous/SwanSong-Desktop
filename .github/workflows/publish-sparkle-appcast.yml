name: Publish Sparkle appcast

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v (for example, 0.2.0)
        required: true
        type: string
      channel:
        description: Sparkle update channel
        required: true
        default: beta
        type: choice
        options:
          - beta
          - stable
      rollout:
        description: Staged seven-day rollout or immediate critical update
        required: true
        default: staged
        type: choice
        options:
          - staged
          - critical

permissions:
  contents: write

concurrency:
  group: publish-sparkle-appcast
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.repository == 'RegionallyFamous/SwanSong-Desktop' &&
      github.ref == 'refs/heads/main'
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out reviewed main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0

      - name: Validate release inputs
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_CHANNEL: ${{ inputs.channel }}
          RELEASE_ROLLOUT: ${{ inputs.rollout }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "version must use X.Y.Z without a leading v" >&2
            exit 64
          }
          case "$RELEASE_CHANNEL" in
            stable|beta) ;;
            *) echo "channel must be stable or beta" >&2; exit 64 ;;
          esac
          case "$RELEASE_ROLLOUT" in
            staged|critical) ;;
            *) echo "rollout must be staged or critical" >&2; exit 64 ;;
          esac
          release_notes="docs/releases/appcast/$RELEASE_VERSION.html"
          python3 Scripts/sparkle_release_notes.py \
            --file "$release_notes" \
            --release-url "https://github.com/RegionallyFamous/SwanSong-Desktop/releases/tag/v$RELEASE_VERSION"
          printf 'RELEASE_VERSION=%s\n' "$RELEASE_VERSION" >>"$GITHUB_ENV"
          printf 'RELEASE_TAG=v%s\n' "$RELEASE_VERSION" >>"$GITHUB_ENV"
          printf 'RELEASE_CHANNEL=%s\n' "$RELEASE_CHANNEL" >>"$GITHUB_ENV"
          printf 'RELEASE_ROLLOUT=%s\n' "$RELEASE_ROLLOUT" >>"$GITHUB_ENV"

      - name: Download immutable GitHub Release assets
        run: |
          set -euo pipefail
          mkdir dist
          release_url="https://github.com/RegionallyFamous/SwanSong-Desktop/releases/download/$RELEASE_TAG"
          for asset in \
            "SwanSong-$RELEASE_VERSION-macOS-universal.zip" \
            "SwanSong-$RELEASE_VERSION-source.tar.xz" \
            "SwanSong-$RELEASE_VERSION.spdx.json" \
            "SwanSong-$RELEASE_VERSION-release.json" \
            SHA256SUMS.txt; do
            curl --fail --location --silent --show-error \
              --proto '=https' --tlsv1.2 \
              --retry 5 --retry-delay 2 --retry-all-errors \
              --output "dist/$asset.partial" "$release_url/$asset"
            mv "dist/$asset.partial" "dist/$asset"
          done

      - name: Resolve the pinned Sparkle signer
        run: |
          set -euo pipefail
          SWAN_SWIFTPM_DISABLE_KEYCHAIN=1 \
            ./Scripts/swift-package.sh package resolve --package-path .

      - name: Sign and verify the appcast
        env:
          SPARKLE_ED25519_PRIVATE_KEY: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY }}
          GITHUB_RELEASE_TOKEN: ${{ github.token }}
          RELEASE_CHANNEL: ${{ inputs.channel }}
        run: |
          set -euo pipefail
          if [[ -z "$SPARKLE_ED25519_PRIVATE_KEY" ]]; then
            echo "SPARKLE_ED25519_PRIVATE_KEY is not configured" >&2
            exit 1
          fi
          ./Scripts/publish-sparkle-appcast.sh \
            --archive "dist/SwanSong-$RELEASE_VERSION-macOS-universal.zip" \
            --source-archive "dist/SwanSong-$RELEASE_VERSION-source.tar.xz" \
            --sbom "dist/SwanSong-$RELEASE_VERSION.spdx.json" \
            --manifest "dist/SwanSong-$RELEASE_VERSION-release.json" \
            --checksums dist/SHA256SUMS.txt \
            --release-tag "$RELEASE_TAG" \
            --channel "$RELEASE_CHANNEL" \
            --rollout "$RELEASE_ROLLOUT" \
            --release-notes "docs/releases/appcast/$RELEASE_VERSION.html"

      - name: Commit the review branch
        run: |
          set -euo pipefail
          status=$(git status --porcelain --untracked-files=all)
          if [[ "$status" != " M updates/appcast.xml" ]]; then
            echo "publisher changed files other than updates/appcast.xml" >&2
            git status --short
            exit 1
          fi
          branch="sparkle-appcast/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git switch -c "$branch"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -- updates/appcast.xml
          git diff --cached --check
          git commit -m "Publish Sparkle $RELEASE_VERSION $RELEASE_CHANNEL appcast"
          git push origin "HEAD:refs/heads/$branch"
          echo "Review and merge branch $branch to publish the signed GitHub feed."
